# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.5
  # 版权年份
  copyrightYear: 2023
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
#  profile: D:/ruoyi/uploadPath
  profile: /home/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8083
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
     multipart:
       # 单个文件大小
       max-file-size:  10MB
       # 设置总上传的文件大小
       max-request-size:  20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  #企业微信包才引入的，com.github.shuaidd
  main:
    allow-bean-definition-overriding: true

# token配置
token:
    # 令牌自定义标识
    header: Authorization
    # 令牌密钥
    secret:
    # 令牌有效期（默认30分钟）
    expireTime: 300

# MyBatis配置
mybatis:
    # 搜索指定包别名
    typeAliasesPackage: com.ruoyi.**.domain
    # 配置mapper的扫描，找到所有的mapper.xml映射文件
    mapperLocations: classpath*:mapper/**/*Mapper.xml
    # 加载全局的配置文件
    configLocation: classpath:mybatis/mybatis-config.xml

mybatis-plus:
  # 加载全局的配置文件
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启 SQL 日志
  global-config:
    # 全局配置
    db-config:
      # 数据库配置
      id-type: auto

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

wx:
  # 公众号配置
  mp:
    configs:
      - appId:
        secret:
        token: xxxxxxxxxx
        aesKey: xxxxxxxxxxxxxxxxxxxx
  # 小程序配置
  ma:
    configs:
      - appId: xxxxxxxxxxxxxxxx
        secret: xxxxxxxxxxxxx
        # 微信支付商户号，请去微信支付平台申请
        mchId:
        # 微信支付商户APIv2密钥，请去微信支付平台申请
        mchKey: xxxxxxxxxxxxxxxxxxxxx
        # p12证书的位置，可以指定绝对路径，也可以指定类路径（以classpath:开头）
        keyPath: classpath:apiclient_cert.p12

mall:
  # 支付、物流回调地址，即后台服务7500端口的外网访问域名，要保证外网能访问，如：https://后台地址/prod-api
  notify-host: http://xx.xxxx.com

flag:
  deleteFlag: true

app:
  temp: Temp

layim.weixin:
  CORPID:
  CORP_SECRET:
  AGENT_ID:
  prefix: https://qyapi.weixin.qq.com/cgi-bin
  WX_GET_TOKEN_URL: ${layim.weixin.prefix}/gettoken?corpid=%s&corpsecret=%s
  WX_SEND_TEXT_MESSAGE: ${layim.weixin.prefix}/message/send?access_token=%s

wx-config:
  wxConfigMap:
    1000002:
      name: 日常消息通知
      corpId:
      corpSecret:
    1000003:
      name: 股票信息通知
      corpId:
      corpSecret:
    1000004:
      name: 理财提醒
      corpId:
      corpSecret:
    1000005:
      name: 系统信息提醒
      corpId:
      corpSecret:


qywx:
  corp-id:
  application-list:
    - secret:
      agentId:
      application-name: 每日消息通知
  url: https://qyapi.weixin.qq.com
  public-path: cgi-bin

timeTask:
  flag: true

